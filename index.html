<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>مكتبتي المحلية</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>📚 مكتبتي (قاعدة بيانات محلية)</h1>
  
  <form id="book-form">
    <input type="text" id="title" placeholder="عنوان الكتاب" required>
    <input type="text" id="author" placeholder="المؤلف" required>
    <input type="text" id="isbn" placeholder="رقم ISBN (اختياري)">
    <button type="submit">➕ أضف كتاباً</button>
  </form>

  <div id="books-list"></div>

  <script src="app.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
  </script>
</body>
</html>
